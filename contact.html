<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | SalTech Solutions</title>

<style>
body{
font-family: Arial, Helvetica, sans-serif;
background:#0b1220;
color:white;
margin:0;
padding:0;
}

.container{
max-width:900px;
margin:80px auto;
padding:40px;
background:linear-gradient(135deg,#111a33,#0b1220);
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

h1{
font-size:40px;
margin-bottom:10px;
}

p{
opacity:.8;
margin-bottom:30px;
}

form{
display:flex;
flex-direction:column;
gap:16px;
}

input, textarea{
padding:14px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
background:linear-gradient(90deg,#6c63ff,#4dd0e1);
color:white;
font-weight:600;
}

.success{
display:none;
text-align:center;
}

.footer{
margin-top:30px;
font-size:14px;
opacity:.7;
text-align:center;
}

.footer a{
color:#7dd3fc;
text-decoration:none;
margin:0 8px;
}
</style>
</head>

<body>

<div class="container">

<div id="formBox">
<h1>Book a Consultation</h1>
<p>Tell us a little about your business and what you’re looking to automate.</p>

<form action="https://formspree.io/f/mqeywyqp" method="POST">
<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Your Email" required>
<textarea name="message" placeholder="What would you like help with?" rows="5" required></textarea>
<button type="submit">Request Consultation</button>
</form>
</div>

<div class="success" id="successBox">
<h1>✅ Request Sent</h1>
<p>Thank you. We will contact you shortly.</p>
<br>
<a href="index.html">
<button>← Return to Homepage</button>
</a>
</div>

<div class="footer">
<a href="privacy.html">Privacy Policy</a> |
<a href="terms.html">Terms & Conditions</a>
</div>

</div>

<script>
const form = document.querySelector("form");
form.addEventListener("submit", function(){
setTimeout(function(){
document.getElementById("formBox").style.display="none";
document.getElementById("successBox").style.display="block";
},600);
});
</script>

</body>
</html>
