<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact SalTech AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0a0f1f;
--text:#f4f7ff;
--muted:#9aa3b2;
--accent1:#7c3aed;
--accent2:#06b6d4;
}

body{
margin:0;
font-family:Inter, sans-serif;
background:linear-gradient(180deg,#070b16,#0b1224);
color:var(--text);
}

.container{
max-width:1100px;
margin:auto;
padding:80px 20px;
}

h1{
font-size:56px;
margin-bottom:12px;
}

p{
color:var(--muted);
line-height:1.7;
max-width:650px;
}

.form{
margin-top:40px;
display:flex;
flex-direction:column;
gap:16px;
max-width:700px;
}

.form-row{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

input, textarea{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
padding:15px;
border-radius:12px;
color:white;
font-family:inherit;
font-size:15px;
}

textarea{
resize:vertical;
}

input:focus, textarea:focus{
outline:none;
border-color:var(--accent2);
}

.btn{
margin-top:8px;
padding:16px 26px;
border-radius:999px;
border:none;
font-weight:700;
cursor:pointer;
background:linear-gradient(135deg,var(--accent1),var(--accent2));
color:white;
font-size:15px;
}

.footer{
margin-top:100px;
padding-top:30px;
border-top:1px solid rgba(255,255,255,0.08);
display:flex;
justify-content:space-between;
color:#7f8aa8;
font-size:14px;
}

.footer a{
color:#9aa3ff;
text-decoration:none;
margin-left:14px;
}

@media(max-width:700px){
.form-row{
grid-template-columns:1fr;
}
h1{
font-size:40px;
}
}

</style>
</head>

<body>

<div class="container">

<h1>Book a Consultation</h1>

<p>
Tell us about your business and what you'd like to automate.
We review every message personally and will follow up to schedule a demo
or consultation tailored to your needs.
</p>

<form action="https://formspree.io/f/mqeywyqp" method="POST" class="form">

<div class="form-row">
<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Business Email" required>
</div>

<input type="text" name="company" placeholder="Business Name (optional)">

<textarea name="message" rows="6"
placeholder="Example: I run a cleaning company and want help with lead capture and automated booking..."
required></textarea>

<button type="submit" class="btn">
Send Message
</button>

</form>

</div>

<div class="footer">
<div>© 2026 SalTech AI</div>
<div>
<a href="privacy.html">Privacy</a>
<a href="terms.html">Terms</a>
</div>
</div>

</body>
</html>
