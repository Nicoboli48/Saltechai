<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sal Tech Solutions | Lead Assistant Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:Inter,system-ui;background:#0b0f1a;color:#fff}
.container{max-width:1100px;margin:auto;padding:24px}
.header{display:flex;justify-content:space-between;align-items:center}
.btn{padding:12px 20px;border-radius:30px;border:1px solid rgba(255,255,255,.15);cursor:pointer}
.primary{background:linear-gradient(135deg,#7c3aed,#06b6d4);border:none}
.hero{margin-top:40px}
.hero h1{font-size:52px;margin:0}
.hero p{color:#aab2c8;max-width:520px}
.demo-box{margin-top:40px;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:20px;min-height:600px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.03)}
.launch{ text-align:center }
#vf{display:none;width:100%;height:600px;border-radius:16px;overflow:hidden}
</style>
</head>
<body>
<div class="container">
<div class="header">
<div><strong>Sal Tech Solutions</strong></div>
<div>
<a class="btn" href="agents.html">Back to demos</a>
<a class="btn primary" href="index.html">Home</a>
</div>
</div>

<div class="hero">
<h1>Lead Assistant Demo</h1>
<p>See how SalTech AI greets visitors, qualifies interest, and captures lead details in real time.</p>
<button class="btn primary" id="launch">Launch Live Demo</button>
</div>

<div class="demo-box">
<div class="launch" id="launchState">
<h2>Start the demo when ready</h2>
<p style="color:#aab2c8">Click launch to begin a fresh lead capture conversation.</p>
</div>
<div id="vf"></div>
</div>
</div>

<script>
let started=false
function clearVF(){Object.keys(localStorage).forEach(k=>{if(k.toLowerCase().includes('voiceflow'))localStorage.removeItem(k)})}
async function start(){if(started)return;started=true;clearVF();document.getElementById('launchState').style.display='none';const box=document.getElementById('vf');box.style.display='block';const s=document.createElement('script');s.src='https://cdn.voiceflow.com/widget-next/bundle.mjs';s.onload=()=>{window.voiceflow.chat.load({verify:{projectID:'698e36167476fb8251060c1c'},url:'https://general-runtime.voiceflow.com',versionID:'production',voice:{url:'https://runtime-api.voiceflow.com'},render:{mode:'embedded',target:box}})};document.body.appendChild(s)}
document.getElementById('launch').onclick=start
</script>
</body>
</html>
